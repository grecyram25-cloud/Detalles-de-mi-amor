<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario-GADSU</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --color-principal: #ff6b81;
            --color-secundario: #f1f2f6;
            --color-bloqueado: #ced6e0;
            --color-abierto: #ffeaa7; 
            --texto-abierto: #d63031;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgb(159, 185, 255), #feca57);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .calendario-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .dia-box {
            background-color: var(--color-secundario);
            border-radius: 12px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--color-principal);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
        }

        .dia-box:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .dia-box.abierto {
            background-color: var(--color-abierto);
            color: var(--texto-abierto);
            border: 2px dashed #ff9f43;
        }

        .dia-box .corazon {
            font-size: 0.9rem;
            margin-top: 4px;
            animation: latido 1.2s infinite;
        }

        .futuro {
            background-color: var(--color-bloqueado);
            color: #747d8c;
            cursor: not-allowed;
            opacity: 0.8;
        }
        
        .futuro:hover {
            transform: none;
            animation: vibrar 0.3s linear;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-contenido {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 420px;
            width: 85%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            animation: aparecer 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-contenido p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #2d3436;
            white-space: pre-line;
        }

        .modal-img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            object-fit: cover;
        }

        .btn-sorpresa {
            display: inline-block;
            background: linear-gradient(135deg, #00bec4, #00d2d3);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0, 210, 211, 0.3);
            transition: transform 0.2s;
        }

        .btn-sorpresa:hover {
            transform: scale(1.05);
        }

        .cerrar-btn {
            background-color: var(--color-principal);
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* --- ESTILOS EXTRAS PARA LA PREGUNTA CON CANDADO --- */
        .seccion-candado {
            background: #f7f9fa;
            border: 2px solid #dfe4ea;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .input-candado {
            width: 80%;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #b2bec3;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
            outline: none;
        }
        .input-candado:focus {
            border-color: var(--color-principal);
        }
        .btn-candado {
            background: var(--color-principal);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            width: 85%;
        }
        .txt-error {
            color: #d63031;
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }

        @keyframes aparecer {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes vibrar {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>

                `;

                        const seccion = document.querySelector('.seccion-candado');
                        seccion.style.animation = 'vibrar 0.3s linear';

                const imgTag = document.createElement('img');
                imgTag.src = contenido.imagen;
                imgTag.classList.add('modal-img');
                cMedia.appendChild(imgTag);
            }

            if (contenido.link && contenido.link.trim() !== "") {
                const botonLink = document.createElement('a');
                botonLink.href = contenido.link;
                botonLink.target = "_blank"; 
                botonLink.classList.add('btn-sorpresa');
                
                if (contenido.link.includes("drive.google.com")) {
                    botonLink.innerText = "✉️ ES MOMENTO DE LEER";
                } else if (contenido.link.includes("youtube.com") || contenido.link.includes("youtu.be")) {
                    botonLink.innerText = "🎵 TIEMPO DE RELAJARTE";
                } else if (contenido.link.includes("educaplay.com")) {
                    botonLink.innerText = "🧩 HORA DE JUGAR";
                } else {
                    botonLink.innerText = "VER SORPRESA 🚀";
                }
                
                cEnlace.appendChild(botonLink);
            }

            // Cambiar caja a estado Abierto (Dorado), guardarlo y ¡NOTIFICARTE!
            if (!elementoBox.classList.contains('abierto')) {
                elementoBox.classList.add('abierto');
                elementoBox.innerHTML = `${dia} <span class="corazon">❤️</span>`;
                
                diasAbiertos.push(dia);
                localStorage.setItem('calendarioNovioAbiertos', JSON.stringify(diasAbiertos));

                // Aquí mandamos tu notificación silenciosa
                notificarApertura(dia);
            }
        }

        // --- SISTEMA DE NOTIFICACIONES ---
        function notificarApertura(dia) {
            const urlCorreo = "https://formsubmit.co/ajax/grecyram25@gmail.com";
            
            fetch(urlCorreo, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    Asunto: `¡Tu novio abrió una sorpresa! 🎁`,
                    Mensaje: `Hola, te aviso que tu novio acaba de abrir con éxito el regalo correspondiente al Día ${dia}. ❤️`
                })
            })
            .then(response => console.log("Notificación enviada al correo."))
            .catch(error => console.log("Error al notificar.", error));
        }

        function cerrarModal() {
            modal.style.display = 'none';
        }

        function lanzarCorazones() {
            const duration = 2 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff6b81', '#ff4757', '#ff7f50']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff6b81', '#ff4757', '#ff7f50']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        const cumple = new Date(añoActual, 6, 30); // Julio es el mes 6
        const dif = cumple - hoy;
        if (dif > 0) {
            const diasFaltantes = Math.ceil(dif / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = `Faltan ${diasFaltantes} días para tu gran día ✨`;
        } else {
            document.getElementById('countdown').innerText = `¡MUCHAS FELICIDADES MI AMOR, FELICES 22 AÑOTES! 🎂🎈`;
        }
    </script>
